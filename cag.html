<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            filter: brightness(0.5);
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        p {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%);
            z-index: 999 !important;
            font-size: 36px;
            font-weight: bold;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
    </style>
</head>
<body style="position: relative; height: 100vh;">
    <p>Sürekli Dizi</p>
      <img src="images/Mordecai_y_Rigby_diciendo_Ohhhhh.jpg">
</body>
</html>
