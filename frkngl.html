<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naber Müdür</title>
    <link rel="icon" type="image/x-icon" href="images/nabermüdür.ico"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            filter: brightness(0.5);
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            object-fit: cover;
            transition: all 0.3s ease-in-out;
        }

        a {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%);
            z-index: 999 !important;
            font-size: 36px;
            font-weight: bold;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            text-decoration: none;
            padding: 10px;
            transition: all 0.3s ease-in-out;
            border-radius: 20px;
        }
        a:hover{
            background-color: white;
            color: black;
        }

        a:hover + img{
            filter: brightness(0.9);
        }
    </style>
</head>
<body style="position: relative; height: 100vh;">
    <a href="cag.html">Naber Müdür</a>
    <img src="images/nabermüdür.jpg">
</body>

</html>
